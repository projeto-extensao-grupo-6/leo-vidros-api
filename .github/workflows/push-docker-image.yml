name: Build and Push Docker Image

on:
  workflow_dispatch:
  push:
    tags:
      - '*.*.*'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set version
        id: version
        shell: bash
        run: |
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

  tests:
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run Java tests
        run: ./mvnw --batch-mode test

  build-jar:
    needs: tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build JAR
        run: ./mvnw --batch-mode clean package -DskipTests

  docker-image:
    needs: build-jar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build --pull --no-cache \
            -f Dockerfile \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/leo-vidros-api:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/leo-vidros-api:${{ needs.setup.outputs.version }} \
            .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/leo-vidros-api:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/leo-vidros-api:${{ needs.setup.outputs.version }}
