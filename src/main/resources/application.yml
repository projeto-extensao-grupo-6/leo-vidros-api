server:
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false
  forward-headers-strategy: framework

spring:
  application:
    name: extension-project-api

  config:
    import: optional:file:env[.properties],optional:file:.env[.properties]

  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1

  docker:
    compose:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
      jdbc:
        time_zone: UTC

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:leo_vidros}
    password: ${RABBITMQ_PASS:leo_vidros_pass}
    template:
      retry:
        enabled: true
        initial-interval: 1000ms
        max-attempts: 3

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

jwt:
  secret: ${JWT_SECRET:minha_chave_secreta_padrao_para_dev_123}

app:
  environment: ${APP_ENV:development}
  pdf:
    storage-path: ${PDF_STORAGE_PATH:resources/pdfs}
  orcamento:
    diretorio: ${PDF_STORAGE_PATH:./storage/orcamentos}
  microservice:
    orcamento:
      url: ${MICROSERVICE_ORCAMENTO_URL:http://localhost:8082}

aws:
  region: ${AWS_REGION:us-east-1}
  access-key-id: ${aws_access_key_id}
  secret-access-key: ${aws_secret_access_key}
  session-token: ${aws_session_token}
  s3:
    bucket: ${AWS_S3_BUCKET}
